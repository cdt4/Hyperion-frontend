<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HYPERION — World View</title>

<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@300;400&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

:root{
  --blue:#378ADD;
  --blue-dim:rgba(55,138,221,0.2);
  --blue-glow:rgba(55,138,221,0.08);
  --bg:#020d1a;
  --surface:rgba(4,20,42,0.85);
  --text:rgba(230,241,251,0.95);
  --muted:rgba(180,210,244,0.45);
  --dim:rgba(180,210,244,0.2);
}

html,body{
  width:100%;
  height:100%;
  background:var(--bg);
  font-family:'Syne',sans-serif;
  color:var(--text);
}

#bg{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

#scanline{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:1px;
  background:linear-gradient(90deg,transparent,rgba(55,138,221,0.08),transparent);
  z-index:3;
  pointer-events:none;
  animation:scan 14s linear infinite;
}

@keyframes scan{
  0%{top:-2px;opacity:0;}
  3%{opacity:1;}
  97%{opacity:1;}
  100%{top:100vh;opacity:0;}
}

#topbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  z-index:20;

  background:rgba(2,13,26,0.9);
  backdrop-filter:blur(16px);

  border-bottom:0.5px solid var(--blue-dim);

  padding:0 40px;
  height:56px;

  display:flex;
  align-items:center;
  justify-content:space-between;
}

#logo{
  font-family:'Syne',sans-serif;
  font-size:18px;
  font-weight:300;
  letter-spacing:0.2em;
  color:var(--text);
  text-decoration:none;
  text-transform:uppercase;
}

#topnav{
  display:flex;
  align-items:center;
  gap:40px;
}

.topnav-link{
  font-family:'Share Tech Mono',monospace;
  font-size:9px;
  letter-spacing:0.28em;
  color:var(--muted);
  text-decoration:none;
  text-transform:uppercase;
  transition:color 0.2s;
}

.topnav-link:hover,
.topnav-link.active{
  color:rgba(133,183,235,1);
}

.topnav-sep{
  width:1px;
  height:12px;
  background:var(--blue-dim);
}

#main{
  position:relative;
  z-index:10;
  height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  text-align:center;
  padding:40px;
}

#message{
  max-width:900px;
}

#title{
  font-size:44px;
  font-weight:300;
  letter-spacing:0.08em;
  margin-bottom:30px;
}

#subtitle{
  font-family:'Share Tech Mono',monospace;
  font-size:14px;
  letter-spacing:0.18em;
  color:var(--muted);
  text-transform:uppercase;
}
#avatar-btn{width:34px;height:34px;border-radius:50%;border:1.5px solid var(--blue-dim);background:rgba(55,138,221,0.12);cursor:pointer;overflow:hidden;display:flex;align-items:center;justify-content:center;transition:border-color 0.25s,box-shadow 0.25s;text-decoration:none;flex-shrink:0;}
#avatar-btn:hover{border-color:rgba(55,138,221,0.7);box-shadow:0 0 12px rgba(55,138,221,0.35);}
#avatar-icon{width:16px;height:16px;opacity:0.45;fill:rgba(133,183,235,0.8);}
</style>
</head>

<body>

<canvas id="bg"></canvas>
<div id="scanline"></div>

<div id="topbar">
  <a href="/" id="logo">Hyperion</a>

  <nav id="topnav">
    <a href="/search" class="topnav-link">Search</a>
    <div class="topnav-sep"></div>
    <a href="/world" class="topnav-link active">World View</a>
    <div class="topnav-sep"></div>
    <a href="/links" class="topnav-link">Links</a>
    <div class="topnav-sep"></div>
    <a href="/docs" class="topnav-link">Docs</a>
    <div class="topnav-sep"></div>
    <a id="avatar-btn" href="/account" title="Account">
      <svg id="avatar-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
    </a>
  </nav>
</div>

<div id="main">
  <div id="message">
    <div id="title">
      World View is still heavily under development
    </div>

    <div id="subtitle">
      But worry not — I'm working hard
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

const dots = Array.from({length:250},()=>({
  x:Math.random()*canvas.width,
  y:Math.random()*canvas.height,
  r:Math.random()<0.05?0.9:0.4,
  a:0.03+Math.random()*0.08
}));

dots.forEach(d=>{
  ctx.beginPath();
  ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
  ctx.fillStyle=`rgba(55,138,221,${d.a})`;
  ctx.fill();
});
</script>

</body>
</html>
